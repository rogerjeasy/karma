          - generic [ref=e86]: The Problem
        - heading "Silent regressions are the hardest bugs to catch." [level=2] [ref=e87]:
          - text: Silent regressions are
          - text: the hardest bugs to catch.
        - paragraph [ref=e88]: Service migrations hide an entire class of regression that no conventional test can find. Karma hunts them down before your users do.
      - generic [ref=e89]:
        - generic [ref=e90]:
          - img [ref=e92]
          - heading "Tests can't see what they were never told" [level=3] [ref=e94]
          - paragraph [ref=e95]: Unit and integration tests verify the contract you explicitly wrote. They have no idea about the implicit behaviors your service evolved over time — undocumented side effects, timing guarantees, and error semantics that callers silently depend on.
        - generic [ref=e96]:
          - img [ref=e98]
          - heading "Replacement services look fine — until they don't" [level=3] [ref=e101]
          - paragraph [ref=e102]: A new service can pass every SLO and still silently break a downstream team's flow. The breakage is real; the signal is missing. Karma generates that signal automatically, without any manual test writing.
        - generic [ref=e103]:
          - img [ref=e105]
          - heading "By the time you know, it's already in production" [level=3] [ref=e108]
          - paragraph [ref=e109]: Silent regressions spread through your system during the migration window. Each hour of silence means corrupted data, failed transactions, and angry users. Detection needs to happen at deployment — not at post-mortem time.
