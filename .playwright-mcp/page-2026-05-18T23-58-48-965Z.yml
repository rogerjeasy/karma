            - heading "Replacement services look fine — until they don't" [level=3] [ref=e106]
            - paragraph [ref=e107]: A new service can pass every SLO and still silently break a downstream team's flow. The breakage is real; the signal is missing. Karma generates that signal automatically.
          - generic [ref=e108]:
