            - heading "Tests can't see what they were never told" [level=3] [ref=e100]
            - paragraph [ref=e101]: Unit and integration tests verify the contract you explicitly wrote. They have no idea about implicit behaviors — undocumented side effects, timing guarantees, and error semantics callers silently depend on.
          - generic [ref=e102]:
