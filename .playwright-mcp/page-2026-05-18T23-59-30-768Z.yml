          - heading "Tests can't see what they were never told" [level=3] [ref=e96]
          - paragraph [ref=e97]: Unit and integration tests verify the contract you explicitly wrote. They have no idea about implicit behaviors — undocumented side effects, timing guarantees, and error semantics callers silently depend on.
        - generic [ref=e98]:
          - img [ref=e100]
          - heading "Replacement services look fine — until they don't" [level=3] [ref=e102]
          - paragraph [ref=e103]: A new service can pass every SLO and still silently break a downstream team's flow. The breakage is real; the signal is missing. Karma generates that signal automatically.
        - generic [ref=e104]:
          - img [ref=e106]
          - heading "By the time you know, it's already in production" [level=3] [ref=e109]
          - paragraph [ref=e110]: Silent regressions spread through your system during the migration window. Detection needs to happen at deployment — not at post-mortem time.
