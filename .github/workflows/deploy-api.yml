name: Deploy API → Cloud Run

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - ".github/workflows/deploy-api.yml"
  workflow_dispatch:

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_LOCATION: ${{ vars.GCP_LOCATION }}
  GAR_LOCATION: ${{ vars.GCP_LOCATION }}
  GAR_REPOSITORY: karma-images
  SERVICE_NAME: karma-api
  IMAGE_NAME: karma-api

permissions:
  contents: read
  id-token: write

jobs:
  test:
    name: Test API
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: api
        run: pip install -e ".[dev]"

      - name: Run tests
        working-directory: api
        env:
          GCP_PROJECT_ID: test-project
          API_SECRET_KEY: ci-placeholder-not-real
        run: pytest tests/ -v --tb=short

      - name: Lint
        working-directory: api
        run: |
          ruff check app/
          mypy app/ --ignore-missing-imports

  deploy:
    name: Deploy to Cloud Run
    needs: test
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Build and push image
        working-directory: api
        run: |
          IMAGE_TAG=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker build -t "$IMAGE_TAG" .
          docker push "$IMAGE_TAG"
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.GCP_LOCATION }}
          image: ${{ env.IMAGE_TAG }}
          flags: >
            --allow-unauthenticated
            --service-account=karma-runner@skillbridge-76a4c.iam.gserviceaccount.com
            --min-instances=1
            --max-instances=10
            --memory=512Mi
            --cpu=1
            --set-secrets=DT_API_TOKEN=dt-api-token:latest,API_SECRET_KEY=api-secret-key:latest,DT_OTEL_TOKEN=dt-otel-token:latest
          env_vars: >
            GCP_PROJECT_ID=${{ env.GCP_PROJECT_ID }},
            GCP_LOCATION=${{ env.GCP_LOCATION }},
            AGENT_ENGINE_RESOURCE_NAME=${{ vars.AGENT_ENGINE_RESOURCE_NAME }},
            ALLOWED_ORIGINS=${{ vars.ALLOWED_ORIGINS }},
            FIRESTORE_DATABASE=(default),
            DT_ENV=${{ vars.DT_ENV }}
