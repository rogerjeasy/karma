name: Deploy Agents → Agent Engine

on:
  push:
    branches: [main]
    paths:
      - "agents/**"
      - ".github/workflows/deploy-agents.yml"
  workflow_dispatch:

env:
  GCP_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
  GCP_LOCATION: ${{ vars.GCP_LOCATION }}
  GAR_LOCATION: ${{ vars.GCP_LOCATION }}
  GAR_REPOSITORY: karma-images
  IMAGE_NAME: karma-agents

permissions:
  contents: read
  id-token: write   # required for OIDC → Workload Identity Federation

jobs:
  test:
    name: Test agents
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        working-directory: agents
        run: |
          pip install uv
          uv pip install -e ".[dev]" --system

      - name: Run tests
        working-directory: agents
        run: pytest tests/ -v --tb=short

      - name: Lint
        working-directory: agents
        run: |
          ruff check karma/
          mypy karma/ --ignore-missing-imports

  deploy:
    name: Deploy to Agent Engine
    needs: test
    runs-on: ubuntu-latest
    environment: production

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Ensure agent staging bucket exists
        run: |
          BUCKET="gs://${{ env.GCP_PROJECT_ID }}-agent-staging"
          if gcloud storage buckets create "$BUCKET" \
               --project="${{ env.GCP_PROJECT_ID }}" \
               --location="${{ env.GCP_LOCATION }}" \
               --uniform-bucket-level-access 2>/dev/null; then
            echo "Created bucket: $BUCKET"
          elif gcloud storage ls "$BUCKET" > /dev/null 2>&1; then
            echo "Bucket already exists: $BUCKET"
          else
            echo "ERROR: cannot create or access $BUCKET" >&2
            echo "Grant the CI service account roles/storage.admin on project ${{ env.GCP_PROJECT_ID }}" >&2
            exit 1
          fi

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GAR_LOCATION }}-docker.pkg.dev --quiet

      - name: Build and push image
        working-directory: agents
        run: |
          IMAGE_TAG=${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.GCP_PROJECT_ID }}/${{ env.GAR_REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
          docker build -t "$IMAGE_TAG" .
          docker push "$IMAGE_TAG"
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deploy dependencies
        working-directory: agents
        run: |
          pip install uv
          uv pip install -e "." "google-cloud-aiplatform[agent_engines]" --system

      - name: Deploy AdkApp to Agent Engine
        working-directory: agents
        env:
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
          DT_ENV: ${{ vars.DT_ENV }}
          DT_API_TOKEN: ${{ secrets.DT_API_TOKEN }}
          DT_OTEL_TOKEN: ${{ secrets.DT_OTEL_TOKEN }}
          AGENT_ENGINE_RESOURCE_NAME: ${{ vars.AGENT_ENGINE_RESOURCE_NAME }}
          MEMORY_BANK_ID: ${{ vars.MEMORY_BANK_ID }}
          FIRESTORE_DATABASE: ${{ vars.FIRESTORE_DATABASE || '(default)' }}
        run: |
          python - <<'EOF'
          import os
          import sys
          import vertexai
          from vertexai import agent_engines
          from vertexai.agent_engines import AdkApp

          project = os.environ["GCP_PROJECT_ID"]
          vertexai.init(
              project=project,
              location=os.environ["GCP_LOCATION"],
              staging_bucket=f"gs://{project}-agent-staging",
          )

          from karma.app import app as coordinator_agent

          # app_name must start with a letter per ADK App.name validator
          # (^[a-zA-Z][a-zA-Z0-9_-]*$). Without an explicit name, set_up()
          # falls back to GOOGLE_CLOUD_AGENT_ENGINE_ID which is a numeric ID
          # like "8160067876737253376" — that starts with a digit and fails.
          # Memory Bank is used directly by the agent tools (memory_bank_tools.py)
          # via VertexAiMemoryBankService initialized from MEMORY_BANK_ID env var —
          # no AdkApp-level wiring needed.
          karma_app = AdkApp(
              agent=coordinator_agent,
              enable_tracing=True,
              app_name="karma-agent",
          )

          # Pass the karma source directory, not the wheel.
          # Agent Engine bundles wheels into a tar.gz and extracts them without
          # pip-installing, so the package would not be importable. Directories
          # are extracted and their parent is added to sys.path — reliable.
          extra_packages = ["karma"]

          requirements = [
              "google-adk>=1.5.0",
              "google-cloud-aiplatform>=1.90.0",
              "pydantic>=2.7.0",
              "pydantic-settings>=2.3.0",
              "google-cloud-firestore>=2.19.0",
              "google-cloud-pubsub>=2.23.0",
              "httpx>=0.27.0",
              "tenacity>=8.3.0",
              "structlog>=24.1.0",
              # OTel — required for gen_ai.* spans, token metrics, and cost tracking
              "opentelemetry-api>=1.27.0",
              "opentelemetry-sdk>=1.27.0",
              "opentelemetry-exporter-otlp-proto-http>=1.27.0",
              "opentelemetry-semantic-conventions>=0.48b0",
          ]

          # Forward secrets/vars into the Agent Engine runtime.
          # The CI env: block above makes these available to this script,
          # but Agent Engine runs in a separate isolated environment and
          # does NOT inherit the GitHub Actions environment automatically.
          env_vars = {
              "DT_ENV":             os.environ.get("DT_ENV", ""),
              "DT_API_TOKEN":       os.environ.get("DT_API_TOKEN", ""),
              "DT_OTEL_TOKEN":      os.environ.get("DT_OTEL_TOKEN", ""),
              "GCP_PROJECT_ID":     os.environ.get("GCP_PROJECT_ID", ""),
              "GCP_LOCATION":       os.environ.get("GCP_LOCATION", "us-central1"),
              "MEMORY_BANK_ID":     os.environ.get("MEMORY_BANK_ID", ""),
              "FIRESTORE_DATABASE": os.environ.get("FIRESTORE_DATABASE", "(default)"),
          }

          # Fail fast — these must be present or agents cannot call Dynatrace.
          required = ["DT_ENV", "DT_API_TOKEN", "GCP_PROJECT_ID"]
          missing = [k for k in required if not env_vars.get(k)]
          if missing:
              print(f"ERROR: required env vars missing: {missing}", flush=True)
              sys.exit(1)

          # Drop truly empty values (but keep non-empty ones including defaults).
          env_vars = {k: v for k, v in env_vars.items() if v}
          print(f"Deploying with env vars: {list(env_vars.keys())}", flush=True)

          resource_name = os.environ.get("AGENT_ENGINE_RESOURCE_NAME", "")
          if resource_name:
              engine = agent_engines.update(
                  resource_name,
                  agent_engine=karma_app,
                  requirements=requirements,
                  extra_packages=extra_packages,
                  env_vars=env_vars,
              )
              print(f"Updated: {engine.resource_name}")
          else:
              engine = agent_engines.create(
                  karma_app,
                  requirements=requirements,
                  extra_packages=extra_packages,
                  env_vars=env_vars,
                  display_name="Karma Agent System",
                  description="Reincarnation agent for deprecated services",
              )
              print(f"Created: {engine.resource_name}")

          resource_id = engine.resource_name.split("/")[-1]
          print(f"REASONING_ENGINE_ID={resource_id}")
          EOF

