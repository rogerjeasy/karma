# Cloud Build pipeline — karma-web (Next.js frontend)
#
# Triggers: push to main branch (path filter: web/**)
#
# Required Cloud Build substitutions:
#   _REGION           us-central1
#   _REPO             us-central1-docker.pkg.dev/skillbridge-76a4c/karma-images
#   _SERVICE          karma-web
#   _GITHUB_TOKEN     GitHub fine-grained PAT (Contents:read + Pull requests:read)
#   _NEXT_PUBLIC_API_URL  https://karma-api-<hash>-uc.a.run.app
#   _NEXT_PUBLIC_DT_ENV   slm61962
#   (Firebase env vars passed as --build-arg)
#
# The SA running this build needs:
#   roles/run.developer
#   roles/datastore.user
#   roles/artifactregistry.writer
#   roles/secretmanager.secretAccessor  (if Firebase keys are in Secret Manager)

substitutions:
  _REGION:  us-central1
  _REPO:    us-central1-docker.pkg.dev/skillbridge-76a4c/karma-images
  _SERVICE: karma-web
  _GITHUB_TOKEN: ""
  _NEXT_PUBLIC_API_URL: https://karma-api-957527396263.us-central1.run.app
  _NEXT_PUBLIC_DT_ENV:  slm61962
  _NEXT_PUBLIC_FIREBASE_PROJECT_ID: ""
  _NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ""
  _NEXT_PUBLIC_FIREBASE_API_KEY: ""
  _NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ""
  _NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ""
  _NEXT_PUBLIC_FIREBASE_APP_ID: ""

steps:
  # ── 1. Build the container image ──────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: build
    args:
      - build
      - -t
      - ${_REPO}/${_SERVICE}:${SHORT_SHA}
      - -t
      - ${_REPO}/${_SERVICE}:latest
      - --build-arg=NEXT_PUBLIC_API_URL=${_NEXT_PUBLIC_API_URL}
      - --build-arg=NEXT_PUBLIC_DT_ENV=${_NEXT_PUBLIC_DT_ENV}
      - --build-arg=NEXT_PUBLIC_FIREBASE_PROJECT_ID=${_NEXT_PUBLIC_FIREBASE_PROJECT_ID}
      - --build-arg=NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${_NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN}
      - --build-arg=NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${_NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET}
      - --build-arg=NEXT_PUBLIC_FIREBASE_API_KEY=${_NEXT_PUBLIC_FIREBASE_API_KEY}
      - --build-arg=NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${_NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID}
      - --build-arg=NEXT_PUBLIC_FIREBASE_APP_ID=${_NEXT_PUBLIC_FIREBASE_APP_ID}
      - ./web

  # ── 2. Push to Artifact Registry ──────────────────────────────────────────
  - name: gcr.io/cloud-builders/docker
    id: push
    waitFor: [build]
    args:
      - push
      - --all-tags
      - ${_REPO}/${_SERVICE}

  # ── 3. Deploy to Cloud Run ────────────────────────────────────────────────
  - name: gcr.io/google.com/cloudsdktool/cloud-sdk
    id: deploy
    waitFor: [push]
    entrypoint: gcloud
    args:
      - run
      - deploy
      - ${_SERVICE}
      - --image=${_REPO}/${_SERVICE}:${SHORT_SHA}
      - --region=${_REGION}
      - --platform=managed
      - --quiet

  # ── 4. Record deployment in Karma Engineering Metrics ────────────────────
  - name: python:3.12-slim
    id: record-deployment
    waitFor: [deploy]
    entrypoint: bash
    args:
      - -c
      - |
        pip install --quiet google-cloud-firestore httpx && \
        python3 scripts/record_karma_deployment.py \
          --service-name  "Karma Web" \
          --commit-sha    "${SHORT_SHA}" \
          --github-repo   "rogerjeasy/karma" \
          --github-token  "${_GITHUB_TOKEN}" \
          --project       "${PROJECT_ID}"

images:
  - ${_REPO}/${_SERVICE}:${SHORT_SHA}
  - ${_REPO}/${_SERVICE}:latest

options:
  logging: CLOUD_LOGGING_ONLY
